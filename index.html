<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NOTERA - Öğretmenler için AI destekli akıllı sınav okuma ve analiz platformu">
    <meta name="theme-color" content="#3B2F5B">
    <title>NOTERA | Değerlendirmenin Akıllı Yolu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              notera: {
                purple: '#3B2F5B',
                turquoise: '#4FB6B2',
                gray: '#F1F5F9',
                dark: '#1E1B2E',
                lightPurple: '#5D4F8D'
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'float': 'float 3s ease-in-out infinite',
            },
            keyframes: {
              fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
              slideUp: { '0%': { transform: 'translateY(30px)', opacity: 0 }, '100%': { transform: 'translateY(0)', opacity: 1 } },
              float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
          font-family: 'Plus Jakarta Sans', sans-serif; 
          transition: background-color 0.4s ease;
          overflow-x: hidden;
        }
        .logo-o { position: relative; display: inline-block; padding: 0 1px; }
        .logo-o::after {
          content: '';
          position: absolute;
          top: 52%; left: 50%;
          transform: translate(-50%, -50%);
          width: 7px; height: 7px;
          background: #4FB6B2;
          border-radius: 50%;
          box-shadow: 0 0 15px rgba(79, 182, 178, 0.8);
        }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
<body class="bg-notera-gray dark:bg-notera-dark text-slate-900 dark:text-slate-100 min-h-screen">
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
</body>
</html>
